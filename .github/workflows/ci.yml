name: CI

# Runs on every PR + every push to main. Three jobs run in parallel:
#   typecheck-and-test  — gates correctness (typecheck + unit tests)
#   audit               — gates supply-chain risk (pnpm audit at high+)
#   integration-tests   — gates schema/trigger correctness against
#                          a real Postgres service container
#
# All three are required for merge (configure as required checks in GitHub
# branch protection on `main`).
#
# THIRD-PARTY ACTIONS ARE SHA-PINNED.
#   Tags are mutable on GitHub. A compromised maintainer can retag v4/v2 to
#   point at malicious code, and the next CI run executes that code with
#   GITHUB_TOKEN. Pinning to commit SHAs blocks tag-rewrite attacks. Comments
#   show the human-readable version. Dependabot's github-actions ecosystem
#   (in .github/dependabot.yml) auto-bumps these on a weekly cadence.
#
#   First-party actions/* stay tag-pinned — far lower compromise risk.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when the same PR is pushed again.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # Version is read from package.json's `packageManager` field
        # (pnpm@10.32.1). Don't pass `version:` here — pnpm/action-setup
        # rejects both sources of truth.
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun (for unit tests)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all workspaces)
        run: pnpm typecheck

      # @docket/shared + @docket/db unit tests run against bun directly to avoid
      # the cross-platform glob expansion issue with pnpm's `bun test src/**`.
      # RLS + audit-immutability tests skip when DATABASE_URL_RLS_TEST is unset.
      - name: Run @docket/shared tests
        run: bun test
        working-directory: packages/shared

      - name: Run @docket/db tests
        run: bun test
        working-directory: packages/db

  audit:
    name: pnpm audit (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # Version is read from package.json's `packageManager` field
        # (pnpm@10.32.1). Don't pass `version:` here — pnpm/action-setup
        # rejects both sources of truth.
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail the job when any HIGH or CRITICAL vulnerability is reported.
      # Moderate + low advisories are surfaced in the run output but don't
      # block merge — they generate Dependabot PRs instead. SOC 2 expects
      # a documented vulnerability-management process; this + Dependabot
      # is that process.
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level high --prod

      # Separate non-fatal pass to surface dev-only advisories in the run
      # log. Useful triage signal even when nothing is blocking.
      - name: pnpm audit (full report, advisory only)
        run: pnpm audit --audit-level moderate || true

  integration-tests:
    name: integration (migrations + triggers + audit chain)
    runs-on: ubuntu-latest
    # Postgres service container — fresh DB per CI run. Same major
    # version as Neon prod (Postgres 16). Trigger functions + RLS work
    # the same way regardless of host.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci_postgres_password
          POSTGRES_DB: docket_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:ci_postgres_password@localhost:5432/docket_ci

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Apply ALL migrations in order. The drizzle-kit journal stops at
      # 0016; apply-migrations-17-22.ts handles the post-journal files
      # via direct SQL execution. Both are idempotent.
      - name: Apply migrations 0000-0016 (drizzle-kit)
        run: pnpm --filter @docket/db migrate
        # The migrate script needs DATABASE_URL to point at the CI
        # Postgres. Already set in the env block above.

      - name: Apply migrations 0017-0022 (post-journal)
        run: bun run packages/db/scripts/apply-migrations-17-22.ts

      # Integration smoke. Proves:
      #   - Composite FK rejects cross-tenant client_id binding
      #   - Audit chain trigger fires with chain_seq + prev_hash + row_hash
      #   - verify_actions_chain returns NULL on intact chain + non-NULL on tamper
      #   - firm_patterns UNIQUE constraint rejects duplicates
      #   - client_facts supersession trigger validates same (tenant, client, fact_key)
      - name: Migration integration smoke (9/9 expected)
        run: bun run packages/db/scripts/smoke-migrations-17-22.ts

      # NOTE: app-level e2e (services/workers/scripts/e2e-app.ts) +
      # eval harnesses (eval-classify, eval-draft) need ANTHROPIC_API_KEY
      # which means a GitHub Actions secret + cost cap discipline.
      # Add `ANTHROPIC_API_KEY` as a repo secret + enable the steps
      # below to gate every PR on agent-quality + composition.
      #
      # - name: App-level e2e (~$0.012, ~13s)
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   run: pnpm --filter @docket/workers e2e:app
      #
      # - name: Eval triage-classifier (F1 >= 0.85, ~$0.024)
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   run: pnpm --filter @docket/workers eval:classify
      #
      # - name: Eval inbox-drafter (>=80% pass, ~$0.06)
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   run: pnpm --filter @docket/workers eval:draft
