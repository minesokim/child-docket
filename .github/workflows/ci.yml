name: CI

# Runs on every PR + every push to main. Two jobs run in parallel:
#   typecheck-and-test  — gates correctness (typecheck + unit tests)
#   audit               — gates supply-chain risk (pnpm audit at high+)
#
# Both jobs are required for merge (configure as required checks in GitHub
# branch protection on `main`).
#
# THIRD-PARTY ACTIONS ARE SHA-PINNED.
#   Tags are mutable on GitHub. A compromised maintainer can retag v4/v2 to
#   point at malicious code, and the next CI run executes that code with
#   GITHUB_TOKEN. Pinning to commit SHAs blocks tag-rewrite attacks. Comments
#   show the human-readable version. Dependabot's github-actions ecosystem
#   (in .github/dependabot.yml) auto-bumps these on a weekly cadence.
#
#   First-party actions/* stay tag-pinned — far lower compromise risk.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when the same PR is pushed again.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # Version is read from package.json's `packageManager` field
        # (pnpm@10.32.1). Don't pass `version:` here — pnpm/action-setup
        # rejects both sources of truth.
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Bun (for unit tests)
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all workspaces)
        run: pnpm typecheck

      # @docket/shared + @docket/db unit tests run against bun directly to avoid
      # the cross-platform glob expansion issue with pnpm's `bun test src/**`.
      # RLS + audit-immutability tests skip when DATABASE_URL_RLS_TEST is unset.
      - name: Run @docket/shared tests
        run: bun test
        working-directory: packages/shared

      - name: Run @docket/db tests
        run: bun test
        working-directory: packages/db

  audit:
    name: pnpm audit (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # Version is read from package.json's `packageManager` field
        # (pnpm@10.32.1). Don't pass `version:` here — pnpm/action-setup
        # rejects both sources of truth.
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail the job when any HIGH or CRITICAL vulnerability is reported.
      # Moderate + low advisories are surfaced in the run output but don't
      # block merge — they generate Dependabot PRs instead. SOC 2 expects
      # a documented vulnerability-management process; this + Dependabot
      # is that process.
      - name: pnpm audit (high+)
        run: pnpm audit --audit-level high --prod

      # Separate non-fatal pass to surface dev-only advisories in the run
      # log. Useful triage signal even when nothing is blocking.
      - name: pnpm audit (full report, advisory only)
        run: pnpm audit --audit-level moderate || true
